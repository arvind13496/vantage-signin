<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vantage — Sign in</title>
  <style>
    :root {
      --ink: #1a1a1a;
      --muted: #8a8a8a;
      --line: #e6e0da;
      --field-border: #e2ddd6;
      --btn: #7d7a76;
      --accent: #f26b3a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background: linear-gradient(135deg, #fdf0e6 0%, #fbe4d4 45%, #f7d9c4 100%);
      display: flex;
      flex-direction: column;
    }

    .page {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 40px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 60px 80px;
    }

    /* ---------- Left / hero ---------- */
    .hero { padding-right: 20px; }

    .eyebrow {
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
      font-weight: 500;
    }

    .hero h1 {
      font-size: 64px;
      line-height: 1.04;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .hero h1 .dim { color: #6f6a66; }

    .mockup {
      margin-top: 56px;
      max-width: 640px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 40px 80px -28px rgba(80, 50, 30, 0.38),
                  0 12px 28px -16px rgba(80, 50, 30, 0.22);
    }
    .mockup .chrome {
      height: 40px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 18px;
      background: #fdfcfb;
    }
    .mockup .chrome span {
      width: 11px; height: 11px; border-radius: 50%;
      background: #dcd6cf;
    }
    .mockup img {
      display: block;
      width: 100%;
      /* crop to 2/3 of the image's natural height (617 -> ~411), showing the top */
      aspect-ratio: 750 / 411;
      height: auto;
      object-fit: cover;
      object-position: top;
    }

    /* ---------- Right / auth card ---------- */
    .auth-wrap { display: flex; justify-content: center; }

    .card {
      background: #fff;
      width: 100%;
      max-width: 430px;
      border-radius: 22px;
      padding: 44px 44px 32px;
      box-shadow: 0 30px 70px -25px rgba(80, 50, 30, 0.30);
    }

    .brand {
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 8px;
    }
    .brand svg { height: 34px; width: auto; display: block; fill: #111; }

    .brand-sub {
      text-align: center;
      font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 34px; font-weight: 500;
    }

    .card h2 { text-align: center; font-size: 24px; font-weight: 700; }
    .card .lead { text-align: center; color: var(--muted); font-size: 15px; margin: 6px 0 28px; }

    .oauth {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 13px;
      border: 1px solid var(--field-border);
      border-radius: 999px;
      background: #fff;
      font-size: 15px; font-weight: 600; color: var(--ink);
      cursor: pointer;
      margin-bottom: 14px;
      transition: background 0.15s, border-color 0.15s;
    }
    .oauth:hover { background: #faf8f6; border-color: #d8d2cb; }
    .oauth svg, .oauth img { width: 18px; height: 18px; }

    .divider {
      display: flex; align-items: center; gap: 14px;
      color: var(--muted); font-size: 14px; margin: 18px 0;
    }
    .divider::before, .divider::after {
      content: ""; flex: 1; height: 1px; background: var(--line);
    }

    .field {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--field-border);
      border-radius: 12px;
      font-size: 15px;
      margin-bottom: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field::placeholder { color: #b3ada7; }
    .field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(242,107,58,0.12); }

    .submit {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: var(--btn);
      color: #fff;
      font-size: 16px; font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .submit:hover { background: #6c6965; }

    .terms {
      text-align: center;
      font-size: 13px; color: var(--muted);
      line-height: 1.6; margin-top: 22px;
    }
    .terms a { color: var(--muted); text-decoration: underline; }

    /* ---------- Footer ---------- */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 24px;
      font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted);
    }
    /* logo viewBox has uneven vertical whitespace (circumflex up top), so
       nudge up slightly to optically center against the POWERED BY caps */
    .footer .keenai-logo { height: 23px; width: auto; display: block; transform: translateY(-2px); }

    .corner-badge {
      position: fixed; left: 22px; bottom: 18px;
      width: 40px; height: 40px; border-radius: 50%;
      background: #1c1a19; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px;
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; padding: 48px 28px; }
      .hero { order: 2; }
      .hero h1 { font-size: 44px; }
      .mockup { display: none; }
      .corner-badge { display: none; }
    }
  </style>
</head>
